<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TraKU &ndash; Asistente Inteligente Universitario</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="login-card">

  <!-- BRAND -->
  <div class="brand">
    <div class="brand-icon">&#127891;</div>
    <h1 class="brand-name">TraKU</h1>
    <p class="brand-sub">Asistente Inteligente Universitario</p>
  </div>

  <!-- TABS -->
  <div class="auth-tabs">
    <button class="auth-tab active" id="tab-btn-login" onclick="switchTab('login')">Iniciar Sesi&#243;n</button>
    <button class="auth-tab" id="tab-btn-register" onclick="switchTab('register')">Crear Cuenta</button>
  </div>

  <!-- LOGIN -->
  <div id="tab-login" class="tab-content active">

    <p class="role-prompt">&#191;Qui&#233;n eres?</p>

    <div class="role-cards">
      <button class="role-card selected" id="role-estudiante" onclick="selectLoginRole('estudiante')" type="button">
        <div class="role-icon est"><i class="ti ti-school"></i></div>
        <span class="role-label">Estudiante</span>
        <span class="role-desc">Alumno activo</span>
      </button>
      <button class="role-card" id="role-psicologo" onclick="selectLoginRole('psicologo')" type="button">
        <div class="role-icon psi"><i class="ti ti-brain"></i></div>
        <span class="role-label">Psic&#243;logo</span>
        <span class="role-desc">Orientador</span>
      </button>
      <button class="role-card" id="role-admin" onclick="selectLoginRole('admin')" type="button">
        <div class="role-icon adm"><i class="ti ti-settings"></i></div>
        <span class="role-label">Admin</span>
        <span class="role-desc">Instituci&#243;n</span>
      </button>
    </div>

    <div id="login-role-error" class="error-msg hidden">Por favor selecciona tu rol.</div>
    <div class="role-divider"></div>

    <div class="input-group">
      <i class="ti ti-mail input-icon"></i>
      <input type="email" id="email" placeholder="Correo electr&#243;nico" required>
    </div>
    <div class="input-group">
      <i class="ti ti-lock input-icon"></i>
      <input type="password" id="password" placeholder="Contrase&#241;a" required>
    </div>

    <div id="login-error" class="error-msg hidden">Credenciales incorrectas. Intenta de nuevo.</div>

    <button class="btn-primary" onclick="handleLogin(event)">Iniciar Sesi&#243;n</button>
    <button class="btn-ghost" onclick="loginAsGuest()">Entrar como invitado (estudiante)</button>

    <div class="demo-hints">
      <p><span class="hint-dot adm"></span>Admin: admin@traku.edu / admin123</p>
      <p><span class="hint-dot psi"></span>Psic&#243;logo: psicologa@traku.edu / psico123</p>
      <p><span class="hint-dot est"></span>Estudiante: karime@universidad.edu / 1234</p>
    </div>

  </div>

  <!-- REGISTER -->
  <div id="tab-register" class="tab-content hidden">

    <p class="role-prompt">&#191;Cu&#225;l es tu rol?</p>

    <div class="role-cards">
      <button class="role-card selected" id="reg-role-estudiante" onclick="selectRegRole('estudiante')" type="button">
        <div class="role-icon est"><i class="ti ti-school"></i></div>
        <span class="role-label">Estudiante</span>
        <span class="role-desc">Alumno activo</span>
      </button>
      <button class="role-card" id="reg-role-psicologo" onclick="selectRegRole('psicologo')" type="button">
        <div class="role-icon psi"><i class="ti ti-brain"></i></div>
        <span class="role-label">Psic&#243;logo</span>
        <span class="role-desc">Orientador</span>
      </button>
      <button class="role-card" id="reg-role-admin" onclick="selectRegRole('admin')" type="button">
        <div class="role-icon adm"><i class="ti ti-settings"></i></div>
        <span class="role-label">Admin</span>
        <span class="role-desc">Instituci&#243;n</span>
      </button>
    </div>

    <input type="hidden" id="reg-role" value="estudiante">
    <div class="role-divider"></div>

    <div class="input-group">
      <i class="ti ti-user input-icon"></i>
      <input type="text" id="reg-name" placeholder="Nombre completo" required>
    </div>
    <div class="input-group">
      <i class="ti ti-mail input-icon"></i>
      <input type="email" id="reg-email" placeholder="Correo electr&#243;nico" required>
    </div>
    <div class="input-group">
      <i class="ti ti-lock input-icon"></i>
      <input type="password" id="reg-password" placeholder="Contrase&#241;a (m&#237;n. 4 caracteres)" required>
    </div>

    <div id="reg-student-fields">
      <div class="input-group">
        <i class="ti ti-books input-icon"></i>
        <input type="text" id="reg-career" placeholder="Carrera universitaria">
      </div>
      <div class="input-group">
        <i class="ti ti-calendar input-icon"></i>
        <select id="reg-semester">
          <option value="1">Semestre 1</option>
          <option value="2">Semestre 2</option>
          <option value="3">Semestre 3</option>
          <option value="4">Semestre 4</option>
          <option value="5">Semestre 5</option>
          <option value="6" selected>Semestre 6</option>
          <option value="7">Semestre 7</option>
          <option value="8">Semestre 8</option>
          <option value="9">Semestre 9</option>
          <option value="10">Semestre 10</option>
        </select>
      </div>
    </div>

    <div id="reg-staff-fields" style="display:none">
      <div class="input-group">
        <i class="ti ti-building input-icon"></i>
        <input type="text" id="reg-area" placeholder="&#193;rea o Departamento">
      </div>
    </div>

    <div id="register-error" class="error-msg hidden"></div>
    <div id="register-success" class="success-msg hidden"></div>

    <button class="btn-primary" onclick="handleRegister(event)">Crear Cuenta</button>

  </div>

</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>
</html>
